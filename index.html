<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cosplan - 集邮快修</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    :root {
      --pink: #ff6b9d; --purple: #7c3aed;
      --bg: #0d0614; --card: rgba(255,255,255,0.08);
      --text: #fff; --text-secondary: rgba(255,255,255,0.55);
      --radius: 20px; --radius-sm: 14px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh; min-height: 100dvh;
      -webkit-font-smoothing: antialiased; display: flex; justify-content: center;
    }
    .app { width: 100%; max-width: 480px; padding: 0 16px 120px; }
    .header { text-align: center; padding: 40px 0 24px; }
    .logo-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 8px; }
    .logo-icon { font-size: 36px; line-height: 1; }
    .logo-text { font-size: 28px; font-weight: 800; background: linear-gradient(135deg, var(--pink), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .tagline { font-size: 14px; color: var(--text-secondary); }
    .tagline span { background: rgba(255,107,157,0.2); color: #ff9ec4; padding: 2px 10px; border-radius: 20px; font-weight: 600; font-size: 12px; }
    .step { display: none; }
    .step.active { display: block; }
    .step-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .step-card { background: var(--card); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius); padding: 24px 20px; margin-bottom: 16px; }

    .upload-zone {
      border: 2px dashed rgba(255,255,255,0.25); border-radius: var(--radius); padding: 36px 20px;
      text-align: center; cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent;
      background: rgba(255,255,255,0.03);
    }
    .upload-zone:active { border-color: var(--pink); background: rgba(255,107,157,0.1); }
    .upload-icon { font-size: 48px; margin-bottom: 10px; display: block; }
    .upload-text { font-size: 15px; font-weight: 600; color: rgba(255,255,255,0.8); }
    .upload-hint { font-size: 12px; color: var(--text-secondary); margin-top: 6px; }

    .upload-actions { display: flex; gap: 10px; margin-top: 12px; }
    .btn-camera {
      flex: 1; height: 48px; border: 1.5px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.06); color: var(--text); border-radius: var(--radius-sm);
      font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-camera:active { background: rgba(255,107,157,0.15); border-color: var(--pink); }

    .photo-preview { display: none; margin-bottom: 16px; }
    .photo-preview.active { display: block; }
    .preview-img-wrap {
      position: relative; border-radius: var(--radius); overflow: hidden;
      background: rgba(0,0,0,0.3); min-height: 120px;
      display: flex; align-items: center; justify-content: center;
    }
    .preview-img-wrap img { max-width: 100%; display: block; }
    .preview-actions { display: flex; gap: 8px; margin-top: 10px; }
    .btn-sm {
      height: 36px; padding: 0 16px; border-radius: 20px; font-size: 13px;
      font-weight: 600; cursor: pointer; border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.7); transition: all 0.15s;
    }
    .btn-sm:active { background: rgba(255,107,157,0.15); border-color: var(--pink); }

    .char-input-row { display: flex; gap: 10px; margin-bottom: 16px; }
    .input-char {
      flex: 1; height: 48px; border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: var(--radius-sm); padding: 0 16px; font-size: 15px; outline: none;
      background: rgba(255,255,255,0.06); color: #fff; transition: border-color 0.2s, background 0.2s;
    }
    .input-char:focus { border-color: var(--pink); background: rgba(255,255,255,0.1); }
    .input-char::placeholder { color: rgba(255,255,255,0.3); }

    .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .filter-chip, .border-chip {
      padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600;
      cursor: pointer; border: 1.5px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.65); transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .filter-chip.active { background: rgba(255,107,157,0.2); border-color: var(--pink); color: #ff9ec4; }
    .border-chip.active { background: rgba(124,58,237,0.2); border-color: var(--purple); color: #a78bfa; }
    .filter-chip:active, .border-chip:active { transform: scale(0.96); }

    .result-wrap {
      background: rgba(255,255,255,0.04); border-radius: var(--radius); padding: 16px; text-align: center;
      position: relative;
    }
    .result-canvas-stack { position: relative; display: inline-block; }
    .result-canvas-stack canvas {
      max-width: 100%; display: block; border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    #filterCanvas {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
    }
    .result-label { font-size: 13px; color: var(--text-secondary); margin-top: 12px; }

    .caption-card { background: rgba(255,255,255,0.06); border-radius: var(--radius-sm); padding: 14px 16px; margin-top: 12px; }
    .caption-platform { font-size: 11px; font-weight: 700; color: #ff9ec4; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .caption-text { font-size: 14px; line-height: 1.6; color: rgba(255,255,255,0.8); margin-bottom: 8px; }
    .caption-copy { font-size: 12px; font-weight: 600; color: #a78bfa; cursor: pointer; padding: 5px 12px; background: rgba(124,58,237,0.15); border-radius: 20px; display: inline-block; border: none; transition: all 0.15s; }
    .caption-copy:active { background: var(--purple); color: #fff; }

    .btn-primary {
      width: 100%; height: 52px; background: linear-gradient(135deg, var(--pink), var(--purple));
      color: #fff; border: none; border-radius: var(--radius-sm); font-size: 16px;
      font-weight: 700; cursor: pointer; letter-spacing: 1px; transition: all 0.15s; margin-top: 16px;
    }
    .btn-primary:active { transform: scale(0.97); opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.4; transform: none; cursor: not-allowed; }

    .btn-secondary {
      width: 100%; height: 48px; border: 1.5px solid rgba(255,107,157,0.4);
      background: rgba(255,255,255,0.06); color: #ff9ec4; border-radius: var(--radius-sm);
      font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.15s; margin-top: 10px;
    }
    .btn-secondary:active { background: rgba(255,107,157,0.15); }

    .toast {
      position: fixed; top: 50px; left: 50%; transform: translateX(-50%); background: var(--purple);
      color: #fff; padding: 10px 24px; border-radius: 30px; font-size: 14px; font-weight: 600;
      opacity: 0; transition: opacity 0.3s; z-index: 200; pointer-events: none;
    }
    .toast.show { opacity: 1; }

    .footer { text-align: center; padding: 24px 0; color: rgba(255,255,255,0.25); font-size: 12px; }

    .bg-decor { position: fixed; top: -100px; right: -100px; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(255,107,157,0.08), transparent 70%); pointer-events: none; z-index: 0; }
    .bg-decor2 { position: fixed; bottom: -80px; left: -80px; width: 250px; height: 250px; border-radius: 50%; background: radial-gradient(circle, rgba(124,58,237,0.08), transparent 70%); pointer-events: none; z-index: 0; }
  </style>
</head>
<body>
  <div class="bg-decor"></div><div class="bg-decor2"></div>

  <div class="app">
    <header class="header">
      <div class="logo-row"><span class="logo-icon">📸</span><span class="logo-text">Cosplan</span></div>
      <p class="tagline">漫展集邮快修 · <span>拍完10秒变能看</span></p>
    </header>

    <!-- Step 1: Upload -->
    <div class="step active" id="stepUpload">
      <div class="step-title">📷 选一张集邮照</div>
      <div class="step-card">
        <div class="upload-zone" id="uploadZone">
          <span class="upload-icon">🖼️</span>
          <div class="upload-text">📁 点击选择照片</div>
          <div class="upload-hint">支持 JPG / PNG / WebP</div>
        </div>
        <div class="upload-actions">
          <button class="btn-camera" id="btnCamera">📷 直接拍照</button>
        </div>
        <input type="file" accept="image/*" id="fileInput" style="display:none;">
        <input type="file" accept="image/*" id="cameraInput" style="display:none;">
      </div>

      <div class="photo-preview" id="photoPreview">
        <div class="preview-img-wrap"><img id="previewImg" alt="预览" style="max-height:50vh;"></div>
        <div class="preview-actions"><button class="btn-sm" onclick="retakePhoto()">🔄 重选</button></div>
      </div>

      <div class="step-title" style="margin-top:8px;">🎭 集到了谁？</div>
      <div class="char-input-row"><input class="input-char" id="charName" placeholder="角色名（如：蕾姆）" maxlength="20"></div>
      <div class="char-input-row"><input class="input-char" id="charName2" placeholder="另一个角色（选填）" maxlength="20"></div>

      <button class="btn-primary" id="btnProcess" disabled>✨ 一键美化</button>
      <div class="footer">Cosplan · cosplan.top</div>
    </div>

    <!-- Step 2: Edit -->
    <div class="step" id="stepEdit">
      <div class="step-title">🎨 微调效果</div>
      <div class="step-card">
        <div style="font-size:13px;color:var(--text-secondary);margin-bottom:10px;">滤镜风格</div>
        <div class="filter-row" id="filterRow">
          <div class="filter-chip active" data-filter="warm">🌅 暖调</div>
          <div class="filter-chip" data-filter="cool">❄️ 冷调</div>
          <div class="filter-chip" data-filter="anime">🌸 柔光</div>
          <div class="filter-chip" data-filter="retro">📼 复古</div>
          <div class="filter-chip" data-filter="none">🫥 原图</div>
        </div>
        <div style="font-size:13px;color:var(--text-secondary);margin-bottom:10px;margin-top:16px;">相框样式</div>
        <div class="border-row" id="borderRow">
          <div class="border-chip active" data-border="polaroid">📷 拍立得</div>
          <div class="border-chip" data-border="manga">💥 漫画格</div>
          <div class="border-chip" data-border="simple">⬜ 简约</div>
        </div>
      </div>

      <div class="result-wrap">
        <div class="result-canvas-stack" id="canvasStack">
          <canvas id="resultCanvas" style="display:block;"></canvas>
          <canvas id="filterCanvas" style="display:none;"></canvas>
        </div>
        <div class="result-label">👆 长按图片保存到相册</div>
      </div>

      <div class="caption-card" id="captionCard">
        <div class="caption-platform">📱 朋友圈 / 小红书</div>
        <div class="caption-text" id="captionText"></div>
        <span class="caption-copy" onclick="copyCaption()">📋 一键复制文案</span>
      </div>

      <button class="btn-primary" onclick="downloadResult()">💾 保存到相册</button>
      <button class="btn-secondary" onclick="shareResult()">📤 分享给朋友</button>
      <button class="btn-secondary" onclick="resetAll()" style="border-color:rgba(255,255,255,0.2);color:rgba(255,255,255,0.5);">🔄 修新的一张</button>
      <div class="footer">Cosplan · cosplan.top</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
const $=id=>document.getElementById(id);
let originalImg=null,currentFilter='warm',currentBorder='polaroid',resultBlob=null;

// --- Upload ---
$('uploadZone').addEventListener('click',()=>{const i=$('fileInput');i.value='';i.click();});
$('btnCamera').addEventListener('click',()=>{const i=$('cameraInput');i.value='';i.setAttribute('capture','environment');i.click();});
$('fileInput').addEventListener('change',e=>handleFile(e.target.files[0]));
$('cameraInput').addEventListener('change',e=>handleFile(e.target.files[0]));

function handleFile(file){
  if(!file)return;
  showToast('📥 读取中...');
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{originalImg=img;$('previewImg').src=ev.target.result;$('photoPreview').classList.add('active');$('btnProcess').disabled=false;};
    img.onerror=()=>showToast('❌ 图片加载失败');
    img.src=ev.target.result;
  };
  reader.onerror=()=>showToast('❌ 读取失败');
  reader.readAsDataURL(file);
}
function retakePhoto(){originalImg=null;$('previewImg').src='';$('photoPreview').classList.remove('active');$('fileInput').value='';$('cameraInput').value='';$('btnProcess').disabled=true;}

// --- Filter chips ---
$('filterRow').addEventListener('click',e=>{
  const chip=e.target.closest('.filter-chip');
  if(!chip)return;
  currentFilter=chip.dataset.filter;
  document.querySelectorAll('#filterRow .filter-chip').forEach(c=>c.classList.remove('active'));
  chip.classList.add('active');
  applyFilter();
});

// --- Border chips ---
$('borderRow').addEventListener('click',e=>{
  const chip=e.target.closest('.border-chip');
  if(!chip)return;
  currentBorder=chip.dataset.border;
  document.querySelectorAll('#borderRow .border-chip').forEach(c=>c.classList.remove('active'));
  chip.classList.add('active');
  renderBorder();
});

// --- Process ---
$('btnProcess').addEventListener('click',()=>{
  if(!originalImg)return;
  $('stepUpload').classList.remove('active');
  $('stepEdit').classList.add('active');
  renderResult(); updateCaption();
  window.scrollTo({top:0,behavior:'smooth'});
});

// --- Filter definitions (CSS filter strings, universally supported) ---
function getFilterCSS(f){
  const m={
    warm:'saturate(1.25) contrast(1.05) brightness(1.08) sepia(0.2)',
    cool:'saturate(1.1) contrast(1.08) brightness(1.02) hue-rotate(10deg)',
    anime:'saturate(1.4) contrast(1.08) brightness(1.08)',
    retro:'saturate(0.7) contrast(1.15) brightness(0.95) sepia(0.3)',
    none:'none'
  };
  return m[f]||'none';
}

// --- Border config ---
function getBorderConfig(b){
  const c={
    polaroid:{padTop:80,padBottom:60,padSide:40,bgColor:'#f5f0eb'},
    manga:{padTop:30,padBottom:30,padSide:30,bgColor:'#1a1a2e'},
    simple:{padTop:20,padBottom:20,padSide:20,bgColor:'#0d0614'}
  };
  return c[b]||c.simple;
}

// --- Main render (base image + border) ---
let cropData=null;
function renderResult(){
  if(!originalImg)return;
  const img=originalImg;
  let sw=img.width,sh=img.height;
  const outW=810,outH=1080,targetRatio=3/4;
  let cropW,cropH,cropX,cropY;
  if(sw/sh>targetRatio){cropH=sh;cropW=sh*targetRatio;cropX=(sw-cropW)/2;cropY=0;}
  else{cropW=sw;cropH=sw/targetRatio;cropX=0;cropY=Math.max(0,(sh-cropH)*0.3);}
  cropData={img,cropX,cropY,cropW,cropH,outW,outH};

  renderBorder();
  applyFilter();
}

// --- Render border (the frame + text, no filter) ---
function renderBorder(){
  if(!cropData)return;
  const {img,cropX,cropY,cropW,cropH,outW,outH}=cropData;
  const canvas=$('resultCanvas'),ctx=canvas.getContext('2d');
  const cfg=getBorderConfig(currentBorder);
  const padTop=cfg.padTop,padBottom=cfg.padBottom,padSide=cfg.padSide;

  canvas.width=outW;canvas.height=outH;
  ctx.fillStyle=cfg.bgColor||'#0d0614';ctx.fillRect(0,0,outW,outH);
  const ix=padSide,iy=padTop,iw=outW-padSide*2,ih=outH-padTop-padBottom;

  // Draw IMAGE (no filter here - filter applied via CSS on overlay)
  ctx.drawImage(img,cropX,cropY,cropW,cropH,ix,iy,iw,ih);

  // Border decorations
  if(currentBorder==='polaroid'){
    ctx.fillStyle='rgba(0,0,0,0.04)';ctx.fillRect(ix+2,iy+2,iw,ih);
  }else if(currentBorder==='manga'){
    ctx.strokeStyle='#fff';ctx.lineWidth=8;ctx.strokeRect(ix-4,iy-4,iw+8,ih+8);
    ctx.strokeStyle='#e94560';ctx.lineWidth=3;ctx.strokeRect(ix-10,iy-10,iw+20,ih+20);
    ctx.strokeStyle='#fff';ctx.lineWidth=4;
    const cs=40;
    [[ix-14,iy-14,1,1],[ix+iw+14,iy-14,-1,1],[ix-14,iy+ih+14,1,-1],[ix+iw+14,iy+ih+14,-1,-1]].forEach(([cx,cy,dx,dy])=>{ctx.beginPath();ctx.moveTo(cx,cy+dy*cs);ctx.lineTo(cx,cy);ctx.lineTo(cx+dx*cs,cy);ctx.stroke();});
  }else{
    ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(ix-1,iy-1,iw+2,ih+2,4);ctx.stroke();
  }

  // Text overlay
  drawTextOverlay(ctx,outW,outH,ix,iy,iw,ih,cfg,padBottom);
}

// --- Apply filter via CSS (on overlay canvas clone) ---
function applyFilter(){
  if(!cropData)return;
  const fcss=getFilterCSS(currentFilter);
  const mainCanvas=$('resultCanvas');
  const filterCanvas=$('filterCanvas');

  if(fcss==='none'){
    filterCanvas.style.display='none';
    return;
  }

  // Clone the base canvas and apply CSS filter
  filterCanvas.width=mainCanvas.width;
  filterCanvas.height=mainCanvas.height;
  const fctx=filterCanvas.getContext('2d');
  fctx.clearRect(0,0,filterCanvas.width,filterCanvas.height);
  fctx.drawImage(mainCanvas,0,0);

  // Apply CSS filter to the canvas element
  filterCanvas.style.display='block';
  filterCanvas.style.filter=fcss;
  filterCanvas.style.webkitFilter=fcss;
}

function drawTextOverlay(ctx,w,h,ix,iy,iw,ih,cfg,padBottom){
  const n1=$('charName').value.trim(),n2=$('charName2').value.trim();
  if(!n1&&!n2)return;
  const isP=currentBorder==='polaroid',isM=currentBorder==='manga';
  if(isP){
    ctx.fillStyle='#333';ctx.font='600 28px "PingFang SC","Microsoft YaHei",sans-serif';ctx.textAlign='center';
    let l=n1;if(n2)l+=`  ×  ${n2}`;
    ctx.fillText(l,w/2,h-padBottom/2+6);
  }else if(isM){
    const taH=80;
    const g=ctx.createLinearGradient(0,h-padBottom-taH,0,h-padBottom);
    g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(0.5,'rgba(0,0,0,0.4)');g.addColorStop(1,'rgba(0,0,0,0.7)');
    ctx.fillStyle=g;ctx.fillRect(ix,iy+ih-taH,iw,taH);
    ctx.fillStyle='#fff';ctx.font='700 32px "PingFang SC","Microsoft YaHei",sans-serif';ctx.textAlign='center';
    let l=`集邮：${n1}`;if(n2)l+=`  ×  ${n2}`;
    ctx.strokeStyle='rgba(0,0,0,0.6)';ctx.lineWidth=4;ctx.strokeText(l,w/2,iy+ih-20);
    ctx.fillText(l,w/2,iy+ih-20);
  }else{
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(ix,iy+ih-50,iw,50);
    ctx.fillStyle='#fff';ctx.font='600 22px "PingFang SC","Microsoft YaHei",sans-serif';ctx.textAlign='center';
    let l=`集邮：${n1}`;if(n2)l+=`  ×  ${n2}`;
    ctx.fillText(l,w/2,iy+ih-30);
  }
}

function updateCaption(){
  const n1=$('charName').value.trim()||'???',n2=$('charName2').value.trim();
  const cs=[
    `今天集到${n1}${n2?'和'+n2:''}了！漫展最快乐的事就是遇到喜欢的角色 🎉`,
    `#漫展集邮 ${n1}${n2?' × '+n2:''} ✅ 今天的人品不错！`,
    `偶遇${n1}${n2?'和'+n2:''}！漫展的意义就是把喜欢的角色都集齐 ✨`,
  ];
  $('captionText').textContent=cs[Math.floor(Math.random()*cs.length)];
}

function copyCaption(){
  const t=$('captionText').textContent;
  navigator.clipboard.writeText(t).then(()=>showToast('✅ 已复制！')).catch(()=>showToast('📋 请长按文案手动复制'));
}

function downloadResult(){
  // Merge filter + base canvas into one for download
  const mergeCanvas=document.createElement('canvas');
  const mainCanvas=$('resultCanvas');
  const filterCanvas=$('filterCanvas');
  mergeCanvas.width=mainCanvas.width;
  mergeCanvas.height=mainCanvas.height;
  const mctx=mergeCanvas.getContext('2d');
  mctx.drawImage(mainCanvas,0,0);
  if(filterCanvas.style.display!=='none'){
    // Apply CSS filter to merge canvas for download
    const fcss=getFilterCSS(currentFilter);
    const tmpCanvas=document.createElement('canvas');
    tmpCanvas.width=mergeCanvas.width;tmpCanvas.height=mergeCanvas.height;
    const tctx=tmpCanvas.getContext('2d');
    tctx.drawImage(mainCanvas,0,0);
    // Use ctx.filter for download (works on modern browsers)
    try{
      mctx.clearRect(0,0,mergeCanvas.width,mergeCanvas.height);
      mctx.filter=fcss;
      mctx.drawImage(tmpCanvas,0,0);
      mctx.filter='none';
    }catch(e){
      // Fallback: no filter on download
      mctx.drawImage(tmpCanvas,0,0);
    }
  }
  mergeCanvas.toBlob(blob=>{
    resultBlob=blob;
    const url=URL.createObjectURL(blob),a=document.createElement('a');
    a.href=url;a.download='集邮_Cosplan.jpg';document.body.appendChild(a);a.click();
    document.body.removeChild(a);URL.revokeObjectURL(url);
    showToast('💾 保存成功！');
  },'image/jpeg',0.92);
}

function shareResult(){
  downloadForShare();
  if(navigator.share&&resultBlob){
    const file=new File([resultBlob],'集邮照.jpg',{type:'image/jpeg'});
    navigator.share({title:'Cosplan 集邮快修',text:$('captionText').textContent,files:[file]}).catch(()=>{});
  }else if(navigator.share){
    navigator.share({title:'Cosplan 集邮快修',text:$('captionText').textContent,url:window.location.href}).catch(()=>{});
  }else{downloadResult();}
}

function downloadForShare(){
  const mergeCanvas=document.createElement('canvas');
  const mainCanvas=$('resultCanvas');
  mergeCanvas.width=mainCanvas.width;mergeCanvas.height=mainCanvas.height;
  const mctx=mergeCanvas.getContext('2d');
  mctx.drawImage(mainCanvas,0,0);
  const fcss=getFilterCSS(currentFilter);
  if(fcss!=='none'){
    try{mctx.filter=fcss;mctx.drawImage(mainCanvas,0,0);mctx.filter='none';}catch(e){}
  }
  mergeCanvas.toBlob(blob=>{resultBlob=blob;},'image/jpeg',0.92);
}

function resetAll(){
  originalImg=null;cropData=null;$('previewImg').src='';$('photoPreview').classList.remove('active');
  $('fileInput').value='';$('cameraInput').value='';
  $('charName').value='';$('charName2').value='';
  currentFilter='warm';currentBorder='polaroid';resultBlob=null;
  $('filterCanvas').style.display='none';
  document.querySelectorAll('#filterRow .filter-chip').forEach(c=>c.classList.toggle('active',c.dataset.filter==='warm'));
  document.querySelectorAll('#borderRow .border-chip').forEach(c=>c.classList.toggle('active',c.dataset.border==='polaroid'));
  $('stepEdit').classList.remove('active');$('stepUpload').classList.add('active');
  $('btnProcess').disabled=true;window.scrollTo({top:0,behavior:'smooth'});
}

function showToast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

['charName','charName2'].forEach(id=>$(id).addEventListener('input',()=>{if($('stepEdit').classList.contains('active')){renderResult();updateCaption();}}));

if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    if(typeof r==='number')r={tl:r,tr:r,br:r,bl:r};
    this.beginPath();this.moveTo(x+r.tl,y);this.lineTo(x+w-r.tr,y);this.quadraticCurveTo(x+w,y,x+w,y+r.tr);
    this.lineTo(x+w,y+h-r.br);this.quadraticCurveTo(x+w,y+h,x+w-r.br,y+h);
    this.lineTo(x+r.bl,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r.bl);
    this.lineTo(x,y+r.tl);this.quadraticCurveTo(x,y,x+r.tl,y);this.closePath();
  };
}
