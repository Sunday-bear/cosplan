<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cosplan · 漫展黑话通</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    :root {
      --pink: #ff6b9d; --purple: #7c3aed;
      --bg: #0d0614; --card: rgba(255,255,255,0.06);
      --text: #fff; --sub: rgba(255,255,255,0.5);
      --radius: 18px; --radius-sm: 12px;
    }
    * { margin:0;padding:0;box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh; min-height: 100dvh;
      -webkit-font-smoothing: antialiased; display: flex; justify-content: center;
    }
    .app { width: 100%; max-width: 480px; padding: 0 16px 60px; position: relative; z-index: 1; }

    .header { text-align: center; padding: 44px 0 20px; }
    .logo { font-size: 36px; line-height: 1; }
    .title {
      font-size: 26px; font-weight: 800; margin: 8px 0 6px;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .subtitle { font-size: 14px; color: var(--sub); }
    .subtitle span { color: #ff9ec4; font-weight: 600; }

    /* Scene tabs */
    .tabs-wrap { position: sticky; top: 0; z-index: 10; background: var(--bg); padding: 8px 0 12px; margin: 0 -16px; padding-left: 16px; }
    .tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600;
      cursor: pointer; white-space: nowrap; border: 1.5px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.55); transition: all 0.15s;
      -webkit-tap-highlight-color: transparent; user-select: none;
    }
    .tab.active { background: rgba(255,107,157,0.18); border-color: var(--pink); color: #ff9ec4; }
    .tab:active { transform: scale(0.96); }

    /* Template cards */
    .card-list { display: flex; flex-direction: column; gap: 10px; }
    .card {
      background: var(--card); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08); border-radius: var(--radius); padding: 16px;
      transition: all 0.2s;
    }
    .card:active { border-color: rgba(255,107,157,0.3); }

    .card-tags { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
    .card-tag {
      font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 12px;
      background: rgba(255,107,157,0.12); color: #ff9ec4;
    }
    .card-tag.green { background: rgba(16,185,129,0.12); color: #34d399; }
    .card-tag.blue { background: rgba(96,165,250,0.12); color: #93c5fd; }

    .card-text {
      font-size: 15px; line-height: 1.7; color: rgba(255,255,255,0.85);
      background: rgba(255,255,255,0.04); padding: 12px 14px; border-radius: var(--radius-sm);
      position: relative; margin-bottom: 10px;
    }
    .card-text .highlight { color: #ff9ec4; font-weight: 600; }

    .card-scene {
      font-size: 11px; color: var(--sub); margin-bottom: 8px; display: flex; align-items: center; gap: 4px;
    }

    .card-actions { display: flex; gap: 8px; }
    .btn-copy {
      font-size: 13px; font-weight: 600; padding: 7px 16px; border-radius: 18px; cursor: pointer;
      border: none; background: linear-gradient(135deg, var(--pink), var(--purple));
      color: #fff; transition: all 0.15s; letter-spacing: 0.5px;
    }
    .btn-copy:active { transform: scale(0.96); opacity: 0.85; }
    .btn-copy.copied { background: #10b981; }

    .btn-tone {
      font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 16px; cursor: pointer;
      border: 1px solid rgba(255,255,255,0.15); background: transparent;
      color: rgba(255,255,255,0.5); transition: all 0.15s;
    }
    .btn-tone.active { border-color: var(--purple); color: #a78bfa; background: rgba(124,58,237,0.12); }

    .toast {
      position: fixed; top: 50px; left: 50%; transform: translateX(-50%); z-index: 200;
      background: var(--purple); color: #fff; padding: 10px 24px; border-radius: 30px;
      font-size: 14px; font-weight: 600; opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    .toast.show { opacity: 1; }

    .footer { text-align: center; padding: 24px 0; color: rgba(255,255,255,0.18); font-size: 12px; }

    .bg-decor { position: fixed; top: -120px; right: -120px; width: 320px; height: 320px; border-radius: 50%; background: radial-gradient(circle, rgba(255,107,157,0.06), transparent 70%); pointer-events: none; z-index: 0; }
    .bg-decor2 { position: fixed; bottom: -100px; left: -100px; width: 280px; height: 280px; border-radius: 50%; background: radial-gradient(circle, rgba(124,58,237,0.06), transparent 70%); pointer-events: none; z-index: 0; }
  </style>
</head>
<body>
  <div class="bg-decor"></div><div class="bg-decor2"></div>

  <div class="app">
    <header class="header">
      <div class="logo">💬</div>
      <div class="title">漫展黑话通</div>
      <p class="subtitle">社恐嘴替 · <span>不知道怎么开口？复制就行</span></p>
    </header>

    <div class="tabs-wrap">
      <div class="tabs" id="tabs"></div>
    </div>

    <div class="card-list" id="cardList"></div>
    <div class="footer">Cosplan · cosplan.top</div>
  </div>

  <div class="toast" id="toast"></div>

<script>
// --- Database ---
const scenes = [
  { id:'jyp', icon:'📸', name:'找Coser集邮' },
  { id:'photog', icon:'📷', name:'找摄影师' },
  { id:'hair', icon:'💇', name:'找毛娘/妆娘' },
  { id:'pic', icon:'📩', name:'要返图' },
  { id:'praise', icon:'👍', name:'夸人/被夸' },
  { id:'shop', icon:'🛍️', name:'买周边/问装备' },
  { id:'follow', icon:'📞', name:'漫展后跟进' },
  { id:'help', icon:'🆘', name:'现场求助' },
];

const tones = ['😊 客气', '😎 随意', '🥰 可爱'];

const templates = {
  photog: [
    { text:'你好！请问你现在有空吗？想请你帮我拍几张，我出的是{角色}，大概需要10分钟左右就行~', tips:'说明角色+时间预期，摄影师好安排' },
    { text:'老师好！方便帮忙拍一下吗？随便按几张都行，不用修图！', tips:'降低对方心理负担' },
    { text:'哈喽～这边需要一位摄影侠！捕捉一只野生{角色}，请求快门支援！📸', tips:'可爱语气，适合轻松氛围' },
  ],
  hair: [
    { text:'你好，请问你接{角色}的造型吗？漫展当天的，方便报个价吗？', tips:'直接说明需求，节省双方时间' },
    { text:'你好～想约{角色}的毛，你这边工期大概多久呀？', tips:'圈内「毛」=假发造型' },
    { text:'请问接展妆吗？出{角色}，想要{风格}一点的风格～', tips:'提前说清风格偏好' },
  ],
  pic: [
    { text:'今天漫展你帮我拍的照片，方便发我一下吗？不急，有空传我就行，谢谢！🙏', tips:'加「不急」减轻对方压力' },
    { text:'哈喽～刚才拍的照片可以发我原图吗？我微博/小红书是{账号}，也可以直接艾特我！', tips:'留联系方式方便对方@你' },
    { text:'打扰啦，今天展子上的照片能发我一下嘛？想看看效果～', tips:'轻松自然，不显得催' },
  ],
  praise: [
    { text:'哇你这个{角色}还原度好高！！道具都是自己做的吗？好厉害！', tips:'夸细节比泛泛夸更有诚意' },
    { text:'谢谢！！你的{角色}也超级棒的，我刚刚就在想你出得好好！', tips:'被夸时的自然回复+回夸' },
    { text:'天哪你这个{角色}太绝了！！请问可以集个邮吗？', tips:'夸+集邮一气呵成' },
  ],
  shop: [
    { text:'请问这套是在哪家买的呀？质感好好，想参考一下～', tips:'用「参考」比直接问更礼貌' },
    { text:'这个可以便宜一点吗？我今天已经买了三件了555', tips:'略带撒娇，漫展场景适用' },
    { text:'你好，请问有{角色}的周边吗？或者类似的款也行！', tips:'给摊主留推荐空间' },
  ],
  follow: [
    { text:'上次漫展拍的照片你修好了吗？期待看到！不着急～', tips:'加「不着急」避免施压' },
    { text:'哈喽！上次展子跟你集邮超开心的，你下次还去哪个展呀？', tips:'用下次展子自然延续话题' },
    { text:'你的{角色}我发小红书了，要艾特你吗？', tips:'主动问要不要@，是很好的社交信号' },
  ],
  help: [
    { text:'不好意思请问一下，{展厅}怎么走呀？', tips:'漫展现场最常用的求助' },
    { text:'你好，请问你有多余的发卡/别针/胶带吗？我的道具突然崩了😭', tips:'漫展应急，圈内人都懂' },
    { text:'打扰了！请问你是在排{活动}吗？方便告诉我排了多久吗？', tips:'排队信息是漫展硬通货' },
  ],
  jyp: [
    { text:'你好！我超喜欢{角色}的，可以跟你合个影吗？', tips:'简单直接，最常用' },
    { text:'哇你也出{作品}！！我今天也出了{我的角色}，可以一起拍一张吗？🥹', tips:'找到同作品粉丝，共鸣感强' },
    { text:'你好～请问可以集个邮吗？你的{角色}真的太棒了！', tips:'先夸再问，成功率更高' },
  ],
};

let activeScene = 'jyp';
let activeTone = 0;

// --- Build UI ---
const tabsEl = document.getElementById('tabs');
scenes.forEach(s => {
  const t = document.createElement('div');
  t.className = 'tab' + (s.id === activeScene ? ' active' : '');
  t.textContent = s.icon + ' ' + s.name;
  t.addEventListener('click', () => { activeScene = s.id; activeTone = 0; renderAll(); });
  tabsEl.appendChild(t);
});

function renderAll() {
  // Update tabs
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab:nth-child(${scenes.findIndex(s=>s.id===activeScene)+1})`).classList.add('active');

  const list = templates[activeScene] || [];
  const sceneInfo = scenes.find(s => s.id === activeScene);

  const cardList = document.getElementById('cardList');
  cardList.innerHTML = '';

  if (!list.length) {
    cardList.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--sub);">🚧 模板收集中，敬请期待</div>';
    return;
  }

  list.forEach((tpl, idx) => {
    const card = document.createElement('div');
    card.className = 'card';

    const toneLabel = tones[activeTone];
    const isCurrentTone = activeTone <= 2;

    // Get text based on tone - rotate through templates with tone offset
    const toneIdx = Math.min(activeTone, list.length - 1);
    const useTpl = list[toneIdx] || list[0];

    card.innerHTML = `
      <div class="card-scene">${sceneInfo.icon} ${sceneInfo.name} · 场景${idx+1}</div>
      <div class="card-tags">
        <span class="card-tag">${toneLabel}</span>
        ${tpl.tips ? `<span class="card-tag green">💡 ${tpl.tips}</span>` : ''}
      </div>
      <div class="card-text">${tpl.text}</div>
      <div class="card-actions">
        <button class="btn-copy" data-text="${tpl.text.replace(/"/g,'&quot;')}">📋 复制这段话</button>
        ${activeTone < tones.length - 1 ? `<button class="btn-tone" data-tone="${activeTone+1}">换${tones[activeTone+1].replace(/^[^\s]+\s/,'')}语气 →</button>` : ''}
        ${activeTone > 0 ? `<button class="btn-tone" data-tone="0">↺ 默认语气</button>` : ''}
      </div>
    `;

    // Copy button
    card.querySelector('.btn-copy').addEventListener('click', function(e) {
      const text = this.dataset.text;
      navigator.clipboard.writeText(text).then(() => {
        this.textContent = '✅ 已复制';
        this.classList.add('copied');
        showToast('✅ 已复制，粘贴就能用！');
        setTimeout(() => {
          this.textContent = '📋 复制这段话';
          this.classList.remove('copied');
        }, 2000);
      }).catch(() => showToast('📋 请长按文字手动复制'));
    });

    // Tone button
    card.querySelectorAll('.btn-tone').forEach(btn => {
      btn.addEventListener('click', function() {
        activeTone = parseInt(this.dataset.tone);
        renderAll();
        document.getElementById('cardList').scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });

    cardList.appendChild(card);
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// --- Init ---
renderAll();
</script>
</body>
</html>
