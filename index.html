<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cosplan - 集邮卡片</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    :root {
      --pink: #ff6b9d; --purple: #7c3aed;
      --bg: #0d0614; --card: rgba(255,255,255,0.08);
      --text: #fff; --text-secondary: rgba(255,255,255,0.55);
      --radius: 20px; --radius-sm: 14px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh; min-height: 100dvh;
      -webkit-font-smoothing: antialiased; display: flex; justify-content: center;
    }
    .app { width: 100%; max-width: 480px; padding: 0 16px 120px; position: relative; z-index: 1; }
    .header { text-align: center; padding: 40px 0 24px; }
    .logo-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 8px; }
    .logo-icon { font-size: 36px; line-height: 1; }
    .logo-text { font-size: 28px; font-weight: 800; background: linear-gradient(135deg, var(--pink), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .tagline { font-size: 14px; color: var(--text-secondary); }
    .tagline span { background: rgba(255,107,157,0.2); color: #ff9ec4; padding: 2px 10px; border-radius: 20px; font-weight: 600; font-size: 12px; }
    .step { display: none; }
    .step.active { display: block; }
    .step-title { font-size: 18px; font-weight: 700; margin: 20px 0 12px; display: flex; align-items: center; gap: 8px; }
    .step-card { background: var(--card); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }

    /* Photo grid */
    .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .photo-slot {
      aspect-ratio: 1; border-radius: var(--radius-sm); background: rgba(255,255,255,0.04);
      border: 2px dashed rgba(255,255,255,0.12); display: flex; align-items: center;
      justify-content: center; cursor: pointer; transition: all 0.15s; position: relative;
      overflow: hidden; -webkit-tap-highlight-color: transparent;
    }
    .photo-slot:active { border-color: var(--pink); background: rgba(255,107,157,0.08); }
    .photo-slot.filled { border-style: solid; border-color: rgba(255,255,255,0.1); }
    .photo-slot img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .photo-slot .plus { font-size: 32px; color: rgba(255,255,255,0.25); }
    .photo-slot .slot-label { position: absolute; bottom: 4px; left: 4px; right: 4px; background: rgba(0,0,0,0.6); color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 6px; display: none; max-width: calc(100% - 8px); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .photo-slot.filled .slot-label { display: block; }
    .slot-delete {
      position: absolute; top: 4px; right: 4px; width: 22px; height: 22px; border-radius: 50%;
      background: rgba(0,0,0,0.6); color: #fff; font-size: 14px; line-height: 22px; text-align: center;
      cursor: pointer; display: none;
    }
    .photo-slot.filled .slot-delete { display: block; }

    .photo-count-hint { font-size: 12px; color: var(--text-secondary); text-align: center; margin-top: 8px; }

    /* Inputs */
    .input-row { display: flex; gap: 10px; margin-bottom: 12px; }
    .input-char {
      flex: 1; height: 48px; border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: var(--radius-sm); padding: 0 16px; font-size: 15px; outline: none;
      background: rgba(255,255,255,0.06); color: #fff; transition: border-color 0.2s;
    }
    .input-char:focus { border-color: var(--pink); background: rgba(255,255,255,0.1); }
    .input-char::placeholder { color: rgba(255,255,255,0.3); }

    .chip-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .style-chip {
      padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600;
      cursor: pointer; border: 1.5px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.65); transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .style-chip.active { background: rgba(255,107,157,0.2); border-color: var(--pink); color: #ff9ec4; }
    .style-chip:active { transform: scale(0.96); }

    /* Result */
    .result-wrap { background: rgba(255,255,255,0.04); border-radius: var(--radius); padding: 16px; text-align: center; }
    .result-wrap canvas { max-width: 100%; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    .result-label { font-size: 13px; color: var(--text-secondary); margin-top: 12px; }

    .caption-card { background: rgba(255,255,255,0.06); border-radius: var(--radius-sm); padding: 14px 16px; margin-top: 12px; }
    .caption-platform { font-size: 11px; font-weight: 700; color: #ff9ec4; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .caption-text { font-size: 14px; line-height: 1.6; color: rgba(255,255,255,0.8); margin-bottom: 8px; }
    .caption-copy { font-size: 12px; font-weight: 600; color: #a78bfa; cursor: pointer; padding: 5px 12px; background: rgba(124,58,237,0.15); border-radius: 20px; display: inline-block; border: none; }
    .caption-copy:active { background: var(--purple); color: #fff; }

    .btn-primary {
      width: 100%; height: 52px; background: linear-gradient(135deg, var(--pink), var(--purple));
      color: #fff; border: none; border-radius: var(--radius-sm); font-size: 16px;
      font-weight: 700; cursor: pointer; letter-spacing: 1px; margin-top: 16px;
    }
    .btn-primary:active { transform: scale(0.97); opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.4; transform: none; cursor: not-allowed; }

    .btn-secondary {
      width: 100%; height: 48px; border: 1.5px solid rgba(255,107,157,0.4);
      background: rgba(255,255,255,0.06); color: #ff9ec4; border-radius: var(--radius-sm);
      font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 10px;
    }
    .btn-secondary:active { background: rgba(255,107,157,0.15); }

    .toast {
      position: fixed; top: 50px; left: 50%; transform: translateX(-50%); background: var(--purple);
      color: #fff; padding: 10px 24px; border-radius: 30px; font-size: 14px; font-weight: 600;
      opacity: 0; transition: opacity 0.3s; z-index: 200; pointer-events: none;
    }
    .toast.show { opacity: 1; }

    .footer { text-align: center; padding: 24px 0; color: rgba(255,255,255,0.25); font-size: 12px; }

    .bg-decor { position: fixed; top: -100px; right: -100px; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(255,107,157,0.08), transparent 70%); pointer-events: none; z-index: 0; }
    .bg-decor2 { position: fixed; bottom: -80px; left: -80px; width: 250px; height: 250px; border-radius: 50%; background: radial-gradient(circle, rgba(124,58,237,0.08), transparent 70%); pointer-events: none; z-index: 0; }
  </style>
</head>
<body>
  <div class="bg-decor"></div><div class="bg-decor2"></div>

  <div class="app">
    <header class="header">
      <div class="logo-row"><span class="logo-icon">📸</span><span class="logo-text">Cosplan</span></div>
      <p class="tagline">漫展集邮卡片 · <span>一天的回忆，一张卡片</span></p>
    </header>

    <!-- Step 1 -->
    <div class="step active" id="stepUpload">
      <div class="step-title">📷 今天的集邮照（1-9张）</div>
      <div class="step-card">
        <div class="photo-grid" id="photoGrid">
          <div class="photo-slot" data-index="0"><span class="plus">+</span><span class="slot-delete" onclick="event.stopPropagation();removePhoto(0)">×</span><span class="slot-label"></span></div>
          <div class="photo-slot" data-index="1"><span class="plus">+</span><span class="slot-delete" onclick="event.stopPropagation();removePhoto(1)">×</span><span class="slot-label"></span></div>
          <div class="photo-slot" data-index="2"><span class="plus">+</span><span class="slot-delete" onclick="event.stopPropagation();removePhoto(2)">×</span><span class="slot-label"></span></div>
          <div class="photo-slot" data-index="3"><span class="plus">+</span><span class="slot-delete" onclick="event.stopPropagation();removePhoto(3)">×</span><span class="slot-label"></span></div>
          <div class="photo-slot" data-index="4"><span class="plus">+</span><span class="slot-delete" onclick="event.stopPropagation();removePhoto(4)">×</span><span class="slot-label"></span></div>
          <div class="photo-slot" data-index="5"><span class="plus">+</span><span class="slot-delete" onclick="event.stopPropagation();removePhoto(5)">×</span><span class="slot-label"></span></div>
          <div class="photo-slot" data-index="6"><span class="plus">+</span><span class="slot-delete" onclick="event.stopPropagation();removePhoto(6)">×</span><span class="slot-label"></span></div>
          <div class="photo-slot" data-index="7"><span class="plus">+</span><span class="slot-delete" onclick="event.stopPropagation();removePhoto(7)">×</span><span class="slot-label"></span></div>
          <div class="photo-slot" data-index="8"><span class="plus">+</span><span class="slot-delete" onclick="event.stopPropagation();removePhoto(8)">×</span><span class="slot-label"></span></div>
        </div>
        <div class="photo-count-hint">点 + 添加照片，最少 1 张，最多 9 张</div>
        <input type="file" accept="image/*" id="fileInput" style="display:none;">
        <input type="file" accept="image/*" id="multiInput" style="display:none;" multiple>
        <div style="display:flex;gap:10px;margin-top:10px;">
          <button class="btn-secondary" id="btnMulti" style="flex:1;font-size:14px;margin-top:0;">📁 批量选图</button>
          <button class="btn-secondary" id="btnCamera" style="flex:1;font-size:14px;margin-top:0;">📷 拍照</button>
        </div>
      </div>

      <div class="step-title" style="margin-top:8px;">🎭 角色标签（按顺序填）</div>
      <div class="input-row"><input class="input-char" id="charNames" placeholder="角色名（用逗号分割，如：蕾姆, 五条悟, 时崎狂三）" maxlength="200"></div>

      <div class="step-title">📍 漫展信息</div>
      <div class="input-row"><input class="input-char" id="eventName" placeholder="漫展名称（如：萤火虫漫展）" maxlength="30"></div>
      <div class="input-row"><input class="input-char" id="eventDate" type="date"></div>

      <button class="btn-primary" id="btnGenerate" disabled>✨ 生成集邮卡片</button>
      <div class="footer">Cosplan · cosplan.top</div>
    </div>

    <!-- Step 2: Preview -->
    <div class="step" id="stepPreview">
      <div class="step-title">🎨 选择风格</div>
      <div class="step-card">
        <div class="chip-row" id="styleRow">
          <div class="style-chip active" data-style="pink">🌸 粉系漫展</div>
          <div class="style-chip" data-style="dark">🌙 暗夜幻境</div>
          <div class="style-chip" data-style="warm">📸 暖调胶片</div>
          <div class="style-chip" data-style="clean">✨ 简约干净</div>
        </div>
      </div>

      <div class="result-wrap">
        <canvas id="resultCanvas" style="width:100%;"></canvas>
        <div class="result-label">👆 长按卡片保存到相册</div>
      </div>

      <div class="caption-card">
        <div class="caption-platform">📱 朋友圈 / 小红书 / 微博</div>
        <div class="caption-text" id="captionText"></div>
        <span class="caption-copy" onclick="copyCaption()">📋 一键复制文案</span>
      </div>

      <button class="btn-primary" onclick="downloadCard()">💾 保存卡片</button>
      <button class="btn-secondary" onclick="shareCard()">📤 分享给朋友</button>
      <button class="btn-secondary" onclick="resetAll()" style="border-color:rgba(255,255,255,0.2);color:rgba(255,255,255,0.5);">🔄 重新生成</button>
      <div class="footer">Cosplan · cosplan.top</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
const $=id=>document.getElementById(id);
let photos=[]; // {img, label} pair
let currentStyle='pink';
let editingIndex=-1;
let cardBlob=null;

// --- Init ---
const slotEls=document.querySelectorAll('.photo-slot');
slotEls.forEach(slot=>{
  slot.addEventListener('click',()=>{editingIndex=parseInt(slot.dataset.index);$('fileInput').click();});
});

$('fileInput').addEventListener('change',e=>{
  if(e.target.files[0])loadPhoto(e.target.files[0],editingIndex);
  e.target.value='';
});

$('btnMulti').addEventListener('click',()=>$('multiInput').click());
$('multiInput').addEventListener('change',e=>{
  Array.from(e.target.files).forEach(file=>{
    const idx=photos.length;
    if(idx<9)loadPhoto(file,idx);
  });
  e.target.value='';
});

$('btnCamera').addEventListener('click',()=>{
  const inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';inp.setAttribute('capture','environment');
  inp.addEventListener('change',e=>{
    if(e.target.files[0]){
      const idx=photos.length;
      if(idx<9)loadPhoto(e.target.files[0],idx);
    }
  });
  inp.click();
});

function loadPhoto(file,idx){
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      if(idx>=photos.length){
        photos.push({img,label:''});
      }else{
        photos[idx]={img,label:photos[idx]?photos[idx].label:''};
      }
      refreshSlots();
      updateGenerateBtn();
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

function removePhoto(idx){
  photos.splice(idx,1);
  refreshSlots();
  updateGenerateBtn();
}

function refreshSlots(){
  slotEls.forEach(slot=>{
    const idx=parseInt(slot.dataset.index);
    const img=slot.querySelector('img');
    const plus=slot.querySelector('.plus');
    const label=slot.querySelector('.slot-label');
    const del=slot.querySelector('.slot-delete');

    if(idx<photos.length){
      if(img)img.src=photos[idx].img.src;
      else{const el=document.createElement('img');el.src=photos[idx].img.src;slot.insertBefore(el,plus);}
      plus.style.display='none';
      del.style.display='block';
      label.textContent=photos[idx].label||'';
      slot.classList.add('filled');
    }else{
      if(img)img.remove();
      plus.style.display='';
      del.style.display='none';
      label.textContent='';
      slot.classList.remove('filled');
    }
  });
}

function updateGenerateBtn(){
  $('btnGenerate').disabled=photos.length===0;
}

// --- Generate ---
$('btnGenerate').addEventListener('click',()=>{
  if(photos.length===0)return;
  // Parse labels
  const labels=($('charNames').value||'').split(/[,，、\s]+/).filter(Boolean);
  photos.forEach((p,i)=>{p.label=labels[i]||'';});
  refreshSlots();

  $('stepUpload').classList.remove('active');
  $('stepPreview').classList.add('active');
  renderCard();updateCaption();
  window.scrollTo({top:0,behavior:'smooth'});
});

// --- Style chips ---
$('styleRow').addEventListener('click',e=>{
  const chip=e.target.closest('.style-chip');
  if(!chip)return;
  currentStyle=chip.dataset.style;
  document.querySelectorAll('#styleRow .style-chip').forEach(c=>c.classList.remove('active'));
  chip.classList.add('active');
  renderCard();
});

// --- Render card ---
function getCardConfig(style){
  const configs={
    pink:{bg:'#fce4ec',text:'#4a0030',accent:'#ff6b9d',accent2:'#f48fb1',photoBg:'#f8bbd0',labelBg:'rgba(255,107,157,0.85)',filter:'saturate(1.15) brightness(1.05)'},
    dark:{bg:'#12122a',text:'#e0e0ff',accent:'#a78bfa',accent2:'#7c3aed',photoBg:'#1e1e3a',labelBg:'rgba(124,58,237,0.8)',filter:'saturate(1.1) contrast(1.1) brightness(1.05)'},
    warm:{bg:'#1a1a0a',text:'#ffe0a0',accent:'#f59e0b',accent2:'#d97706',photoBg:'#2a2a10',labelBg:'rgba(245,158,11,0.8)',filter:'saturate(0.9) contrast(1.1) brightness(1.02) sepia(0.3)'},
    clean:{bg:'#fafafa',text:'#1a1a2e',accent:'#2563eb',accent2:'#60a5fa',photoBg:'#e8e8ee',labelBg:'rgba(37,99,235,0.8)',filter:'saturate(1.05) brightness(1.05) contrast(1.02)'}
  };
  return configs[style]||configs.pink;
}

function renderCard(){
  const cfg=getCardConfig(currentStyle);
  const n=photos.length;
  if(n===0)return;

  const canvas=$('resultCanvas'),ctx=canvas.getContext('2d');
  const cardW=1000,cardH=n<=2?1200:(n<=4?1400:1600);
  canvas.width=cardW;canvas.height=cardH;

  // Background
  ctx.fillStyle=cfg.bg;ctx.fillRect(0,0,cardW,cardH);

  const pad=40,topPad=100,bottomPad=80;

  // --- Header ---
  const eventName=$('eventName').value.trim()||'漫展集邮';
  const dateStr=$('eventDate').value||new Date().toISOString().slice(0,10);
  const dateFormatted=dateStr.replace(/-/g,'.');

  // Date badge
  ctx.fillStyle=cfg.accent;ctx.font='700 22px "PingFang SC","Microsoft YaHei",sans-serif';ctx.textAlign='center';
  ctx.fillText(dateFormatted,cardW/2,42);
  // Event title
  ctx.fillStyle=cfg.text;ctx.font='800 44px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.fillText(`📸 ${eventName}`,cardW/2,92);

  // --- Photo grid ---
  let cols,rows;
  if(n===1){cols=1;rows=1;}
  else if(n===2){cols=2;rows=1;}
  else if(n===3){cols=3;rows=1;}
  else if(n===4){cols=2;rows=2;}
  else if(n<=6){cols=3;rows=2;if(n===5)n=5;}
  else{cols=3;rows=3;}
  // Handle non-full rows: for 5 photos, first row 3, second row 2 (center them)
  // For 7 photos: 3+3+1, for 8: 3+3+2, for 9: 3+3+3

  const gridW=cardW-pad*2;
  const gridH=cardH-topPad-bottomPad-120; // Leave room for labels below
  const cellGap=12;
  const cellW=(gridW-cellGap*(cols-1))/cols;
  const cellH=Math.min((gridH-cellGap*(rows-1))/rows,cellW*1.3);
  const gridStartY=topPad+20;

  // Draw photos
  for(let i=0;i<Math.min(n,9);i++){
    const photo=photos[i];
    if(!photo||!photo.img)continue;

    // Calculate position
    let col,row;
    if(n<=6){
      const actualRows=Math.ceil(n/3);
      const actualCols=n<=3?n:(n<=4?2:3);
      const actualGap=cellGap;
      const actualCellW=(gridW-actualGap*(actualCols-1))/actualCols;
      const actualCellH=Math.min((gridH-actualGap*(actualRows-1))/actualRows,actualCellW*1.3);
      const perRow=n<=3?n:(n<=4?2:3);
      col=i%perRow;
      row=Math.floor(i/perRow);
      // Center last row
      const itemsInRow=(row===actualRows-1)?(n-row*perRow):perRow;
      const rowWidth=itemsInRow*actualCellW+(itemsInRow-1)*actualGap;
      const offsetX=pad+(gridW-rowWidth)/2;

      const x=offsetX+col*(actualCellW+actualGap);
      const y=gridStartY+row*(actualCellH+actualGap);

      drawPhotoCell(ctx,x,y,actualCellW,actualCellH,photo,cfg);
      // Label below
      if(photo.label){
        const ly=y+actualCellH+6;
        ctx.fillStyle=cfg.text;ctx.font='600 24px "PingFang SC","Microsoft YaHei",sans-serif';ctx.textAlign='center';
        ctx.fillText(photo.label,x+actualCellW/2,ly+24);
      }
    }else{
      col=i%3;
      row=Math.floor(i/3);
      const x=pad+col*(cellW+cellGap);
      const y=gridStartY+row*(cellH+cellGap);
      drawPhotoCell(ctx,x,y,cellW,cellH,photo,cfg);
      // Label below
      if(photo.label){
        const ly=y+cellH+6;
        ctx.fillStyle=cfg.text;ctx.font='600 24px "PingFang SC","Microsoft YaHei",sans-serif';ctx.textAlign='center';
        ctx.fillText(photo.label,x+cellW/2,ly+24);
      }
    }
  }

  // --- Footer watermark ---
  const footerY=cardH-30;
  ctx.fillStyle=cfg.accent2;ctx.globalAlpha=0.6;
  ctx.font='600 18px "PingFang SC","Microsoft YaHei",sans-serif';ctx.textAlign='center';
  ctx.fillText('cosplan.top · 漫展集邮卡片',cardW/2,footerY);
  ctx.globalAlpha=1;

  // Generate blob
  canvas.toBlob(blob=>{cardBlob=blob;},'image/jpeg',0.92);
}

function drawPhotoCell(ctx,x,y,w,h,photo,cfg){
  // Photo background
  ctx.fillStyle=cfg.photoBg;
  ctx.beginPath();ctx.roundRect(x,y,w,h,12);ctx.fill();

  // Clip to rounded rect
  ctx.save();ctx.beginPath();ctx.roundRect(x+2,y+2,w-4,h-4,10);ctx.clip();
  const img=photo.img;
  const scale=Math.max(w/img.width,h/img.height);
  const sw=img.width*scale,sh=img.height*scale;
  const sx=(w-sw)/2,sy=(h-sh)/2;
  // Try filter
  try{ctx.filter=cfg.filter;ctx.drawImage(img,x+sx,y+sy,sw,sh);ctx.filter='none';}
  catch(e){ctx.drawImage(img,x+sx,y+sy,sw,sh);}
  ctx.restore();

  // Border
  ctx.strokeStyle=cfg.accent;ctx.lineWidth=2;ctx.globalAlpha=0.4;
  ctx.beginPath();ctx.roundRect(x,y,w,h,12);ctx.stroke();
  ctx.globalAlpha=1;

  // Label on photo
  if(photo.label){
    ctx.fillStyle=cfg.labelBg;
    const labelPad=8,labelH=28;
    ctx.beginPath();ctx.roundRect(x+4,y+h-labelH-4,w-8,labelH,8);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='600 18px "PingFang SC","Microsoft YaHei",sans-serif';ctx.textAlign='center';
    ctx.fillText(photo.label,x+w/2,y+h-labelH/2+6);
    ctx.textAlign='start';
  }
}

// --- Caption ---
function updateCaption(){
  const labels=photos.map(p=>p.label||'???').filter(Boolean);
  const event=$('eventName').value.trim()||'漫展';
  const date=$('eventDate').value||new Date().toISOString().slice(0,10);
  const lstr=labels.slice(0,5).join('、')+(labels.length>5?'等':'');
  const cs=[
    `${date} ${event} · 今日集邮：${lstr} ✨ 终于集齐了！`,
    `#漫展集邮 #${event.replace(/\s/g,'')} 今天遇到的coser都好棒！${lstr} 🎉`,
    `${event}一日游～集到了${lstr}！开心到飞起 📸`,
  ];
  $('captionText').textContent=cs[Math.floor(Math.random()*cs.length)];
}

function copyCaption(){
  const t=$('captionText').textContent;
  navigator.clipboard.writeText(t).then(()=>showToast('✅ 已复制！')).catch(()=>showToast('📋 请长按文案手动复制'));
}

function downloadCard(){
  if(!cardBlob)return;
  const url=URL.createObjectURL(cardBlob),a=document.createElement('a');
  const ev=$('eventName').value.trim()||'漫展';
  a.href=url;a.download=`集邮卡片_${ev}_Cosplan.jpg`;document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
  showToast('💾 卡片已保存！');
}

function shareCard(){
  downloadForShare();
  if(navigator.share&&cardBlob){
    const file=new File([cardBlob],'集邮卡片.jpg',{type:'image/jpeg'});
    navigator.share({title:'Cosplan 集邮卡片',text:$('captionText').textContent,files:[file]}).catch(()=>{});
  }else{downloadCard();}
}

function downloadForShare(){
  const canvas=$('resultCanvas');
  canvas.toBlob(blob=>{cardBlob=blob;},'image/jpeg',0.92);
}

function resetAll(){
  photos=[];cardBlob=null;currentStyle='pink';
  $('charNames').value='';$('eventName').value='';$('eventDate').value='';
  refreshSlots();updateGenerateBtn();
  document.querySelectorAll('#styleRow .style-chip').forEach(c=>c.classList.toggle('active',c.dataset.style==='pink'));
  $('stepPreview').classList.remove('active');$('stepUpload').classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

function showToast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

// --- Date default ---
$('eventDate').value=new Date().toISOString().slice(0,10);

// --- roundRect polyfill ---
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    if(typeof r==='number')r={tl:r,tr:r,br:r,bl:r};
    this.beginPath();this.moveTo(x+r.tl,y);this.lineTo(x+w-r.tr,y);this.quadraticCurveTo(x+w,y,x+w,y+r.tr);
    this.lineTo(x+w,y+h-r.br);this.quadraticCurveTo(x+w,y+h,x+w-r.br,y+h);
    this.lineTo(x+r.bl,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r.bl);
    this.lineTo(x,y+r.tl);this.quadraticCurveTo(x,y,x+r.tl,y);this.closePath();
  };
}
