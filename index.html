<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cosplan · 角色快诊</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    :root {
      --pink:#ff6b9d;--purple:#7c3aed;--bg:#0d0614;--card:rgba(255,255,255,0.06);
      --text:#fff;--sub:rgba(255,255,255,0.5);--radius:18px;--radius-sm:12px;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
      background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;
      -webkit-font-smoothing:antialiased;display:flex;justify-content:center;
    }
    .app{width:100%;max-width:480px;padding:0 16px 80px;position:relative;z-index:1}
    .header{text-align:center;padding:40px 0 20px}
    .logo{font-size:40px}
    .title{font-size:26px;font-weight:800;margin:6px 0 4px;background:linear-gradient(135deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .subtitle{font-size:13px;color:var(--sub)}
    .subtitle span{color:#ff9ec4;font-weight:600}

    .view{display:none}
    .view.active{display:block}

    /* Form */
    .form-section{margin-bottom:20px}
    .form-label{font-size:14px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
    .form-hint{font-size:11px;color:var(--sub);font-weight:400;margin-left:auto}

    .chip-row{display:flex;gap:8px;flex-wrap:wrap}
    .chip{
      padding:10px 18px;border-radius:20px;font-size:14px;font-weight:600;cursor:pointer;
      border:1.5px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);
      color:rgba(255,255,255,0.55);transition:all 0.15s;-webkit-tap-highlight-color:transparent;
      user-select:none;
    }
    .chip.active{background:rgba(255,107,157,0.18);border-color:var(--pink);color:#ff9ec4}
    .chip:active{transform:scale(0.96)}

    .btn-primary{
      width:100%;height:54px;background:linear-gradient(135deg,var(--pink),var(--purple));
      color:#fff;border:none;border-radius:var(--radius-sm);font-size:17px;font-weight:700;
      cursor:pointer;letter-spacing:1px;margin-top:20px;transition:all 0.15s;
    }
    .btn-primary:active{transform:scale(0.97);opacity:0.9}
    .btn-primary:disabled{opacity:0.35;transform:none;cursor:not-allowed}

    /* Result */
    .result-header{text-align:center;padding:16px 0}
    .result-header .match-label{font-size:13px;color:var(--sub);margin-bottom:4px}
    .result-header .match-count{font-size:42px;font-weight:800;background:linear-gradient(135deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .result-header .match-sub{font-size:13px;color:var(--sub)}

    .char-card{
      background:var(--card);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius);padding:18px;
      margin-bottom:12px;position:relative;overflow:hidden;
    }
    .char-card.premium{opacity:0.5;filter:blur(4px);pointer-events:none}
    .char-rank{
      position:absolute;top:0;right:16px;font-size:56px;font-weight:800;
      color:rgba(255,255,255,0.03);line-height:1;pointer-events:none;
    }
    .char-header{display:flex;align-items:center;gap:12px;margin-bottom:10px}
    .char-avatar{
      width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;
      font-size:28px;background:rgba(255,107,157,0.12);
    }
    .char-info{flex:1}
    .char-name{font-size:18px;font-weight:700}
    .char-series{font-size:12px;color:var(--sub)}
    .char-match{
      font-size:14px;font-weight:800;color:#ff9ec4;
      background:rgba(255,107,157,0.12);padding:4px 10px;border-radius:10px;
    }
    .char-why{
      font-size:12px;color:var(--sub);line-height:1.6;margin-bottom:12px;
      background:rgba(255,255,255,0.03);padding:10px 12px;border-radius:var(--radius-sm);
    }
    .char-why strong{color:rgba(255,255,255,0.7)}
    .char-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
    .char-tag{
      font-size:11px;font-weight:600;padding:4px 10px;border-radius:10px;
      background:rgba(124,58,237,0.1);color:#a78bfa;
    }
    .char-tag.pink{background:rgba(255,107,157,0.1);color:#ff9ec4}
    .char-tag.green{background:rgba(16,185,129,0.1);color:#34d399}
    .char-tag.orange{background:rgba(245,158,11,0.1);color:#f59e0b}

    .char-cost{display:flex;gap:16px;font-size:13px;color:var(--sub)}
    .char-cost span{color:rgba(255,255,255,0.7);font-weight:600}

    .lock-banner{
      text-align:center;padding:32px 16px;margin:20px 0;
      background:rgba(124,58,237,0.06);border:1px solid rgba(124,58,237,0.15);
      border-radius:var(--radius);
    }
    .lock-banner .lock-icon{font-size:36px;margin-bottom:8px}
    .lock-banner .lock-title{font-size:16px;font-weight:700;margin-bottom:6px}
    .lock-banner .lock-desc{font-size:13px;color:var(--sub);line-height:1.6;margin-bottom:14px}
    .btn-unlock{
      display:inline-flex;align-items:center;gap:6px;padding:12px 28px;
      background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;
      border:none;border-radius:24px;font-size:15px;font-weight:700;cursor:pointer;
      letter-spacing:1px;
    }
    .btn-unlock:active{transform:scale(0.96)}

    .back-btn{
      display:flex;align-items:center;gap:6px;font-size:14px;color:var(--sub);
      cursor:pointer;margin-bottom:16px;padding:4px 0;-webkit-tap-highlight-color:transparent;
    }
    .back-btn:active{color:var(--pink)}

    .toast{
      position:fixed;top:50px;left:50%;transform:translateX(-50%);z-index:200;
      background:var(--purple);color:#fff;padding:10px 24px;border-radius:30px;
      font-size:14px;font-weight:600;opacity:0;transition:opacity 0.3s;pointer-events:none;
    }
    .toast.show{opacity:1}
    .footer{text-align:center;padding:24px 0;color:rgba(255,255,255,0.15);font-size:12px}

    .bg-decor{position:fixed;top:-120px;right:-120px;width:340px;height:340px;border-radius:50%;background:radial-gradient(circle,rgba(255,107,157,0.05),transparent 70%);pointer-events:none;z-index:0}
    .bg-decor2{position:fixed;bottom:-100px;left:-100px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(124,58,237,0.05),transparent 70%);pointer-events:none;z-index:0}
  </style>
</head>

// ═══════ UI ═══════
function buildChips(rowId, opts, key) {
  const row = document.getElementById(rowId);
  row.innerHTML = opts.map(o => `
    <div class="chip" data-v="${o.v}" onclick="selectChip('${key}','${o.v}',this)">${o.icon} ${o.label}</div>
  `).join('');
}

['height','build','face','gender','budget'].forEach(k => {
  buildChips(k+'Row', options[k], k);
});

function selectChip(key, val, el) {
  selected[key] = val;
  document.querySelectorAll(`#${key}Row .chip`).forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  updateBtn();
}

function updateBtn() {
  const all = Object.values(selected).every(v => v !== null);
  document.getElementById('btnDiagnose').disabled = !all;
}

// ═══════ MATCHING ═══════
function scoreChar(char) {
  let score = 0, reasons = [];
  
  if (selected.gender !== 'any') {
    if (char.gender === selected.gender) { score += 30; reasons.push('性别匹配'); }
    else score -= 50;
  }
  
  if (char.height === selected.height) { score += 25; reasons.push('身高完美匹配'); }
  else {
    const hOrder = ['short','mid-low','mid','mid-high','tall'];
    const diff = Math.abs(hOrder.indexOf(char.height) - hOrder.indexOf(selected.height));
    if (diff === 1) { score += 15; reasons.push('身高接近'); }
    else if (diff === 2) score += 5;
  }
  
  if (char.build === selected.build) { score += 20; reasons.push('体型天生契合'); }
  else if (
    (char.build === 'average' && selected.build === 'slim') ||
    (char.build === 'slim' && selected.build === 'average')
  ) { score += 10; reasons.push('体型相近'); }
  
  if (char.face === selected.face) { score += 15; reasons.push('脸型匹配'); }
  else {
    const faceCompat = {round:['oval'],oval:['round','heart'],heart:['oval'],square:['oval','long'],long:['oval','square']};
    if (faceCompat[selected.face]?.includes(char.face)) { score += 8; reasons.push('脸型兼容'); }
  }
  
  if (selected.budget !== 'any') {
    if (char.cost === selected.budget) { score += 10; reasons.push('预算匹配'); }
    else if (char.cost === 'low' && selected.budget !== 'low') { score += 5; }
    else if (selected.budget === 'low' && char.cost !== 'low') score -= 5;
  }
  
  return {score,reasons};
}

function diagnose() {
  const results = characters.map(char => ({
    ...char,
    ...scoreChar(char)
  })).filter(c => c.score > 0)
    .sort((a,b) => b.score - a.score);

  document.getElementById('homeView').classList.remove('active');
  document.getElementById('resultView').classList.add('active');
  document.getElementById('matchCount').textContent = results.length;

  const list = document.getElementById('resultList');
  list.innerHTML = results.map((c,i) => {
    const isLocked = i >= 3;
    const matchPct = Math.min(100, Math.round(c.score / 100 * 100));
    return `
      <div class="char-card${isLocked?' premium':''}" style="${isLocked?'':'--rank:'+(i+1)}">
        <div class="char-rank">#${i+1}</div>
        <div class="char-header">
          <div class="char-avatar">${c.tags[0]==='可爱'?'🎀':c.tags[0]==='经典'?'⭐':c.tags[0]==='人气'?'🔥':c.tags[0]==='飒'?'⚔️':c.tags[0]==='优雅'?'💫':'✨'}</div>
          <div class="char-info">
            <div class="char-name">${c.name}</div>
            <div class="char-series">${c.series}</div>
          </div>
          <div class="char-match">${matchPct}% 匹配</div>
        </div>
        <div class="char-why">
          <strong>为什么适合你：</strong>${c.reasons.join(' · ')}
        </div>
        <div class="char-tags">
          ${c.tags.map(t => {
            const cls = t==='可爱'||t==='低门槛'?'pink':t==='经典'?'green':t==='华丽'||t==='精致'?'orange':'';
            return `<span class="char-tag ${cls}">${t}</span>`;
          }).join('')}
          <span class="char-tag" style="background:rgba(255,255,255,0.05);color:var(--sub)">复杂度:${c.complexity}</span>
        </div>
        <div class="char-cost">
          <span>💰 预估 <b>${c.cost==='low'?'500以内':c.cost==='mid'?'500-2000':'2000+'}</b></span>
          ${!isLocked?`<span style="color:#ff9ec4;cursor:pointer;margin-left:auto;" onclick="showToast('🔒 详细出装清单为付费功能（开发中）')">📋 看出装清单 →</span>`:''}
        </div>
      </div>
    `;
  }).join('');

  // Lock banner
  if (results.length > 3) {
    list.innerHTML += `
      <div class="lock-banner">
        <div class="lock-icon">🔒</div>
        <div class="lock-title">解锁全部 ${results.length} 个角色</div>
        <div class="lock-desc">
          获取完整匹配列表 + 每个角色的详细出装清单<br>
          含购买渠道推荐、省钱平替方案、OOC 避雷指南
        </div>
        <button class="btn-unlock" onclick="showToast('💰 9.9元解锁全部（支付功能开发中）')">✨ 9.9 解锁全部</button>
      </div>
    `;
  }

  window.scrollTo({top:0,behavior:'smooth'});
}

function goHome() {
  document.getElementById('resultView').classList.remove('active');
  document.getElementById('homeView').classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

function showToast(msg) {
  const t = document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

document.getElementById('btnDiagnose').addEventListener('click',diagnose);
</script>
</body>
</html>
